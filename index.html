<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>💖 Shosho Birthday 20 💖</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #0a0a0a, black);
    overflow: hidden;
    font-family: Arial;
}

canvas {
    display: block;
}

#start {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 18px 35px;
    font-size: 22px;
    background: linear-gradient(45deg, #ff69b4, #ff1493);
    color: white;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 0 20px hotpink;
}
</style>
</head>
<body>

<button id="start">💖 اضغطي هنا يا شوشو 💖</button>

<canvas id="c"></canvas>

<audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
const btn = document.getElementById("start");
const music = document.getElementById("music");

c.width = window.innerWidth;
c.height = window.innerHeight;

let started = false;

btn.onclick = () => {
    music.play();
    started = true;
    btn.style.display = "none";
};

/* 💌 رسائل */
let msgs = [
"🎂 اليوم 20… يوم ميلاد شوشو 💖",
"انتي أجمل شعور بالحياة ✨",
"ابتسامتك تضيء قلبي 😍",
"يا شوشو انتي الحلم الجميل 💕",
"كل سنة وانتي بخير ❤️",
"الله يحفظك دايمًا 💫",
"وجودك نعمة ما تنوصف 🌹",
"Happy Birthday Shosho 🎉💖"
];

let i = 0;
setInterval(()=> {
    i = (i + 1) % msgs.length;
}, 2200);

/* 💜 قلوب بنفسجية */
let stars = [];
for(let i=0;i<140;i++){
    stars.push({
        x: Math.random()*c.width,
        y: Math.random()*c.height,
        s: Math.random()*8 + 2,
        v: Math.random()*1.2 + 0.5
    });
}

/* 💖 قلوب طايرة */
let hearts = [];

function addHeart(){
    hearts.push({
        x: Math.random()*c.width,
        y: c.height,
        s: Math.random()*12+6,
        v: Math.random()*2+1
    });
}

/* 💜 قلب وردي واضح */
function drawHeart(x,y,size){
    ctx.fillStyle = "#ff4da6"; // وردي واضح وثابت
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.bezierCurveTo(x+size,y-size,
                      x+size*2,y+size/2,
                      x,y+size*2);
    ctx.bezierCurveTo(x-size*2,y+size/2,
                      x-size,y-size,
                      x,y);
    ctx.fill();
}

/* ❤️ قلب S */
function bigHeart(){
    ctx.fillStyle = "#ff2e93";
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    let scale = 13;

    for (let t = 0; t <= 360; t += 3) {
        let r = t * Math.PI / 180;

        let x = 16 * Math.sin(r) ** 3;
        let y = -(13 * Math.cos(r)
                - 5 * Math.cos(2*r)
                - 2 * Math.cos(3*r)
                - Math.cos(4*r));

        x = c.width/2 + x * scale;
        y = c.height/2 + y * scale + 40; // 👈 نزّلنا القلب لتحت

        ctx.fillText("S", x, y);
    }
}

/* 🎬 رسم */
function draw(){
    ctx.clearRect(0,0,c.width,c.height);

    /* 💜 خلفية قلوب */
    stars.forEach(s=>{
        s.y += s.v;

        if(s.y > c.height){
            s.y = 0;
            s.x = Math.random()*c.width;
        }

        drawHeart(s.x,s.y,s.s);
    });

    /* 💖 قلوب طايرة */
    if(started && Math.random()<0.14) addHeart();

    hearts.forEach((h,i)=>{
        h.y -= h.v;
        drawHeart(h.x,h.y,h.s);

        if(h.y<0) hearts.splice(i,1);
    });

    /* ❤️ قلب S */
    bigHeart();

    /* 💌 نصوص (مرفوعة لفوق عشان ما تتعارض) */
    if(started){
        ctx.fillStyle="white";
        ctx.font="bold 28px Arial";
        ctx.textAlign="center";
        ctx.shadowColor="hotpink";
        ctx.shadowBlur = 10;
        ctx.fillText(msgs[i], c.width/2, 50); // 👈 رفعنا النص

        ctx.fillStyle="#ffb6e6";
        ctx.font="bold 22px Arial";
        ctx.fillText("💖 Happy Birthday Shosho 💖", c.width/2, c.height-60);

        ctx.fillStyle="white";
        ctx.font="bold 18px Arial";
        ctx.fillText("🎂 20th Birthday Special 🎂", c.width/2, c.height-30);
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
