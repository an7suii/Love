<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>💖 Shosho Birthday 20 💖</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial;
}

canvas {
    display: block;
}

#start {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 18px 35px;
    font-size: 22px;
    background: hotpink;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    z-index: 10;
}
</style>
</head>
<body>

<button id="start">💖 اضغطي هنا يا شوشو 💖</button>

<canvas id="c"></canvas>

<audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
const btn = document.getElementById("start");
const music = document.getElementById("music");

c.width = window.innerWidth;
c.height = window.innerHeight;

let started = false;

btn.onclick = () => {
    music.play();
    started = true;
    btn.style.display = "none";
};

/* 💖 رسائل */
let msgs = [
"🎂 اليوم 20… يوم ميلاد شوشو الجميلة 💖",
"انتي مو مجرد شخص… انتي سعادة تمشي ✨",
"ابتسامتك تسوى الدنيا وما فيها 😍",
"يا شوشو انتي أجمل حكاية 💕",
"كل سنة وانتي بخير يا قلب قلبي ❤️",
"الله يحفظك ويخليك دايمًا فرحانة 💫",
"وجودك نعمة كبيرة 🌹",
"Happy Birthday Shosho 🎉💖"
];

let i = 0;
setInterval(()=> {
    i = (i + 1) % msgs.length;
}, 2200);

/* 💜 قلوب بنفسجية (بدل النجوم) */
let stars = [];
for(let i=0;i<120;i++){
    stars.push({
        x: Math.random()*c.width,
        y: Math.random()*c.height,
        s: Math.random()*6 + 2,
        v: Math.random()*1 + 0.5
    });
}

/* 💖 قلوب طايرة */
let hearts = [];

function addHeart(){
    hearts.push({
        x: Math.random()*c.width,
        y: c.height,
        s: Math.random()*10+8,
        v: Math.random()*2+1
    });
}

/* 💖 رسم قلب صغير */
function drawHeart(x, y, size){
    ctx.fillStyle = "violet";
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.bezierCurveTo(x + size, y - size,
                      x + size*2, y + size/2,
                      x, y + size*2);
    ctx.bezierCurveTo(x - size*2, y + size/2,
                      x - size, y - size,
                      x, y);
    ctx.fill();
}

/* ❤️ قلب كبير */
let scale = 10;
let grow = true;

function bigHeart(){
    for(let t=0;t<360;t++){
        let r = t*Math.PI/180;
        let x = 16*Math.sin(r)**3;
        let y = -(13*Math.cos(r)-5*Math.cos(2*r)-2*Math.cos(3*r)-Math.cos(4*r));

        x = c.width/2 + x*scale;
        y = c.height/2 + y*scale;

        ctx.fillStyle = "red";
        ctx.fillRect(x,y,2,2);
    }
}

/* 🎬 الرسم */
function draw(){
    ctx.clearRect(0,0,c.width,c.height);

    /* 💜 قلوب بنفسجية خلفية */
    ctx.fillStyle="purple";
    stars.forEach(s=>{
        s.y += s.v;

        if(s.y > c.height){
            s.y = 0;
            s.x = Math.random()*c.width;
        }

        drawHeart(s.x, s.y, s.s);
    });

    /* 💖 قلوب طايرة */
    if(started && Math.random()<0.12) addHeart();

    hearts.forEach((h,i)=>{
        h.y -= h.v;
        drawHeart(h.x,h.y,h.s);

        if(h.y<0) hearts.splice(i,1);
    });

    /* ❤️ القلب الكبير */
    bigHeart();

    /* 💌 النصوص */
    if(started){
        ctx.fillStyle="hotpink";
        ctx.font="bold 26px Arial";
        ctx.textAlign="center";
        ctx.fillText(msgs[i], c.width/2, 60);

        ctx.fillStyle="white";
        ctx.font="bold 20px Arial";
        ctx.fillText("💖 Happy Birthday Shosho 💖", c.width/2, c.height-60);

        ctx.font="bold 18px Arial";
        ctx.fillText("🎂 20th Birthday Special 🎂", c.width/2, c.height-30);
    }

    /* 🔄 حركة */
    if(grow){
        scale += 0.1;
        if(scale > 12) grow = false;
    } else {
        scale -= 0.1;
        if(scale < 10) grow = true;
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
